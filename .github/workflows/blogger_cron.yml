name: Blogger Trends Hourly Bot

on:
  schedule:
    - cron: '0 * * * *'  # Executa a cada hora
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Recreate config and credentials files
      env:
        ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        CLIENT_SECRET_CONTENT: ${{ secrets.CLIENT_SECRET_JSON }}
        TOKEN_CONTENT: ${{ secrets.TOKEN_JSON }}
      run: |
        printf '%s' "$ENV_FILE_CONTENT" > .env
        printf '%s' "$CLIENT_SECRET_CONTENT" > client_secret.json
        printf '%s' "$TOKEN_CONTENT" > token.json
        python -c "import json; json.load(open('token.json')); print('token.json OK')"
        python -c "import json; json.load(open('client_secret.json')); print('client_secret.json OK')"

    - name: Run Blogger Bot
      run: python blogger_bot.py
